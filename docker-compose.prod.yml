services:
  api:
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-warning}

  front4:
    environment:
      NODE_ENV: production
    ports:
      - "${NUXT4_PORT:-3001}:3000"

  nginx:
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_TLS_PORT:-443}:443"
