services:
  api:
    build:
      context: .
      dockerfile: .docker/api/Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-https://example.com}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      LOG_CHANNEL: stack
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      TZ: ${TZ:-Europe/Kiev}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ${DOCKER_DATA_DIR:-.docker/volumes}/api/storage:/var/www/html/storage
      - ${DOCKER_DATA_DIR:-.docker/volumes}/api/bootstrap-cache:/var/www/html/bootstrap/cache
      - ${DOCKER_DATA_DIR:-.docker/volumes}/api/uploads:/var/www/html/public/uploads

  queue:
    build:
      context: .
      dockerfile: .docker/api/Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-https://example.com}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      LOG_CHANNEL: stack
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      TZ: ${TZ:-Europe/Kiev}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ${DOCKER_DATA_DIR:-.docker/volumes}/api/storage:/var/www/html/storage
      - ${DOCKER_DATA_DIR:-.docker/volumes}/api/bootstrap-cache:/var/www/html/bootstrap/cache
      - ${DOCKER_DATA_DIR:-.docker/volumes}/api/uploads:/var/www/html/public/uploads
    command: php artisan queue:work database --sleep=3 --tries=3 --timeout=90

  # Archived legacy frontend kept for rollback only.
  front:
    build:
      context: .
      dockerfile: .docker/front/Dockerfile
    profiles: ["archive"]
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      NUXT_API_BASE_URL: ${NUXT_API_BASE_URL:-http://api:8080/}
      NUXT_BROWSER_BASE_URL: ${NUXT_BROWSER_BASE_URL:-/}
      NUXT_IMAGE_DOMAINS: ${NUXT_IMAGE_DOMAINS:-localhost}
      TZ: ${TZ:-Europe/Kiev}
    depends_on:
      - api

  front4:
    build:
      context: ./src/nuxt4
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NUXT_API_BASE_URL: ${NUXT4_API_BASE_URL:-http://api:8080/api/}
      TZ: ${TZ:-Europe/Kiev}
    depends_on:
      - api

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ:-Europe/Kiev}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ${DOCKER_DATA_DIR:-.docker/volumes}/mysql/data:/var/lib/mysql
      - ${DOCKER_DATA_DIR:-.docker/volumes}/mysql/dumps:/docker/dumps

  phpmyadmin:
    image: phpmyadmin:5-apache
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
      UPLOAD_LIMIT: 128M

  nginx:
    build:
      context: .
      dockerfile: .docker/nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
      - front4
      - phpmyadmin
    environment:
      DOMAIN: ${DOMAIN:-example.com}
      SERVER_ALIASES: ${SERVER_ALIASES:-}
      NGINX_RELOAD_INTERVAL: ${NGINX_RELOAD_INTERVAL:-5m}
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  certbot:
    image: certbot/certbot:latest
    profiles: ["prod"]
    restart: unless-stopped
    depends_on:
      - nginx
    environment:
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
      CERTBOT_DOMAINS: ${CERTBOT_DOMAINS}
      CERTBOT_RENEW_INTERVAL: ${CERTBOT_RENEW_INTERVAL:-12h}
    entrypoint: /bin/sh
    command: -c "chmod +x /etc/certbot/renew.sh && /etc/certbot/renew.sh"
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - ./.docker/certbot/renew.sh:/etc/certbot/renew.sh:ro

volumes:
  certbot_conf:
  certbot_www:
  api_vendor:
  front4_node_modules:
  front4_nuxt:
  front4_output:
