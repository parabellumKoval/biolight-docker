page:
  index:
    experienced_team: Досвідчена команда
    quality_control: Контроль якості
    modern_production: Сучасне виробництво
    manufacturing:
      bad:
        title: Виробництво БАД
        items:
          - title: Виробництво БАД під замовлення
            paragraphs:
              - >-
                Це швидкий спосіб запустити власний бренд вітамінів і
                дієтичних добавок без необхідності будувати завод та
                закуповувати обладнання для виробництва БАД. Компанія Bio Light
                пропонує професійне контрактне виробництво БАД і повний цикл
                послуг: від розробки формули до випуску готового продукту та
                оформлення всієї необхідної документації.
          - title: Сучасне виробництво харчових дієтичних добавок
            paragraphs:
              - >-
                Ми забезпечуємо сучасне виробництво дієтичних добавок та
                виробництво БАД в Україні для брендів, маркетплейсів, аптечних
                мереж і інтернет-магазинів. Наше контрактне виробництво БАД в
                Україні дозволяє підприємцям швидко вийти на ринок із власним
                продуктом, використовуючи реальні виробничі потужності та
                досвід команди технологів.
              - >-
                Bio Light — це компанія з виробництва БАД, яка супроводжує
                проєкт на всіх етапах: аналіз ідеї, розробка рецептури, підбір
                сировини, лабораторний контроль та постановка БАД на
                виробництво. Ми також консультуємо клієнтів щодо законодавчих
                вимог — допомагаємо зрозуміти, які документи потрібні для
                виробництва БАД, підготувати їх, а за потреби пояснюємо
                вимоги, пов’язані з процедурою реєстрації та отриманням
                дозволів, включаючи ліцензію на виробництво БАД.
          - title: Контрактне виробництво БАД
            paragraphs:
              - >-
                Для підприємців, які планують масштабувати проєкт, ми
                допомагаємо зрозуміти, як організувати виробництво БАД,
                підготувати бізнес-план або бізнес-план з виробництва БАД, а
                також оформити договір контрактного виробництва БАД. Такий
                підхід дозволяє запустити стабільне виробництво БАД без
                великих інвестицій у власні виробничі потужності.
              - >-
                Наше промислове виробництво БАД в Україні випускає капсули,
                таблетки, порошкові суміші, саше та рідкі форми. Це сучасне
                виробництво БАД в Україні, яке відповідає міжнародним
                стандартам якості та безпеки. Завдяки контрактній моделі ви
                можете створити власну лінійку вітамінів і нутрицевтиків під
                своїм брендом для продажу в аптеках, інтернет-магазинах і на
                маркетплейсах.
      vitamin:
        title: Виробництво вітамінів в Україні
        highlights:
          left:
            - title: Контролюємо рецептуру
              text: Строго відповідно до ТУ
            - title: Використовуємо сировину
              text: Сертифіковану за міжнародними стандартами
            - title: Працюємо з постачальниками
              text: Сировини та упаковки з усього світу
          right:
            - title: Виробляємо точно в строк
              text: Відповідно до умов договору
            - title: Розробляємо формули
              text: На основі наукових досліджень
            - title: Випускаємо партії
              text: Пробні та серійні
        items:
          - title: Виробництво вітамінів під власною торговою маркою Private Label
            paragraphs:
              - >-
                Контрактне виробництво вітамінів — це ефективний спосіб
                запустити власний бренд без інвестицій у будівництво заводу та
                складну виробничу інфраструктуру. Компанія Bio Light надає
                виробництво вітамінів під власною торговою маркою Private Label
                та повний комплекс послуг із контрактного виробництва вітамінів
                в Україні — від розробки формули до випуску готової продукції.
              - >-
                Ми реалізуємо виробництво вітамінів під власною торговою маркою
                для брендів, аптечних мереж, маркетплейсів та
                інтернет-магазинів. Завдяки сучасним виробничим лініям і
                технологічній базі наше промислове виробництво вітамінів
                відповідає міжнародним стандартам якості та безпеки.
              - >-
                В основі наших рішень лежить сучасна технологія виробництва
                вітамінів, що включає лабораторні дослідження, контроль
                сировини та оптимізацію формул. Ми використовуємо нові
                технології виробництва вітамінів, а також елементи
                біотехнологічного виробництва вітамінів, що дозволяє
                створювати ефективні та безпечні формули для різних категорій
                споживачів.
          - title: Виробництво вітамінів в Україні
            paragraphs:
              - >-
                Наше виробництво вітамінів в Україні охоплює розробку
                рецептур, підбір інгредієнтів, тестування та серійний випуск
                продукції. Завдяки цьому бренди можуть виводити на ринок
                вітаміни українського виробництва, що відповідають міжнародним
                стандартам та очікуванням споживачів. Багато таких продуктів
                стають найкращими вітамінами українського виробництва у своїх
                категоріях.
              - >-
                Bio Light також допомагає запускати СТМ (власні торгові марки)
                — ми виконуємо розробку СТМ, забезпечуємо контрактне
                виробництво СТМ, а також консультуємо з питань виведення
                продукту на ринок і просування СТМ. Такий підхід дозволяє
                підприємцям і компаніям швидко створити власну лінійку
                вітамінів, нутрицевтиків і дієтичних добавок.
              - >-
                Наші виробничі потужності дозволяють реалізовувати виробництво
                медикаментів, вітамінів і препаратів біосинтезу, включаючи
                різні форми випуску: капсули, таблетки, порошкові суміші та
                рідкі формули.
              - >-
                Співпрацюючи з Bio Light, ви отримуєте надійного партнера для
                контрактного виробництва вітамінів, який забезпечує повний цикл
                — від ідеї продукту до його успішного запуску на ринок.

