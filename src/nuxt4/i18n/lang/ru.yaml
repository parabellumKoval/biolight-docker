page:
  index:
    experienced_team: Опытная команда
    quality_control: Контроль качества
    modern_production: Современное производство
    manufacturing:
      bad:
        title: Производство БАД
        items:
          - title: Производство БАД под заказ
            paragraphs:
              - >-
                Это быстрый способ запустить собственный бренд витаминов и
                диетических добавок без необходимости создавать завод и
                закупать оборудование для производства БАД. Компания Bio Light
                предлагает профессиональное контрактное производство БАД и
                полный цикл услуг: от разработки формулы до выпуска готовой
                продукции и оформления всей необходимой документации.
          - title: Современное производство диетических пищевых добавок
            paragraphs:
              - >-
                Мы обеспечиваем современное производство диетических добавок и
                производство БАД в Украине для брендов, маркетплейсов, аптечных
                сетей и интернет-магазинов. Наше контрактное производство БАД
                Украина позволяет предпринимателям быстро выйти на рынок с
                собственным продуктом, используя реальные производственные
                мощности и опыт команды технологов.
              - >-
                Bio Light — это компания по производству БАД, которая
                сопровождает проект на всех этапах: анализ идеи, разработка
                рецептуры, подбор сырья, лабораторный контроль и постановка БАД
                на производство. Мы также консультируем клиентов по вопросам
                законодательства — помогаем разобраться, какие документы нужны
                для производства БАД, подготовить, а при необходимости
                объясняем требования, связанные с процедурой регистрации и
                получением разрешений, включая лицензию на производство БАД.
          - title: Контрактное производство БАД
            paragraphs:
              - >-
                Для предпринимателей, которые планируют масштабировать проект,
                мы помогаем понять как организовать производство БАД,
                подготовить бизнес план или бизнес план по производству БАД, а
                также оформить договор контрактного производства БАД. Такой
                подход позволяет запустить стабильное бад производство без
                крупных инвестиций в собственные мощности.
              - >-
                Наше промышленное производство БАД в Украине выпускает капсулы,
                таблетки, порошковые смеси, саше и жидкие формы. Это
                современное бады производство Украина, соответствующее
                международным стандартам качества и безопасности. Благодаря
                контрактной модели вы можете создать собственную линейку
                витаминов и нутрицевтиков под своим брендом для продаж в
                аптеках, интернет-магазинах и на маркетплейсах.
      vitamin:
        title: Производство витаминов в Украине
        highlights:
          left:
            - title: Контролируем рецептуру
              text: Строго в соответствии с ТУ
            - title: Используем сырье
              text: Сертифицированное по международным стандартам
            - title: Работаем с поставщиками
              text: Сырья и упаковки со всего мира
          right:
            - title: Производим точно в срок
              text: Согласно условиям договора
            - title: Разрабатываем формулы
              text: На основе научных исследований
            - title: Выпускаем партии
              text: Пробные и серийные
        items:
          - title: Производство витаминов под собственной торговой маркой Private Label
            paragraphs:
              - >-
                Контрактное производство витаминов — это эффективный способ
                запустить собственный бренд без инвестиций в строительство
                завода и сложную производственную инфраструктуру. Компания Bio
                Light предоставляет производство витаминов под собственной
                торговой маркой Private Label и полный комплекс услуг по
                контрактному производству витаминов в Украине — от разработки
                формулы до выпуска готовой продукции.
              - >-
                Мы реализуем производство витаминов под собственной торговой
                маркой для брендов, аптечных сетей, маркетплейсов и
                онлайн-магазинов. Благодаря современным производственным линиям
                и технологической базе наше промышленное производство витаминов
                соответствует международным стандартам качества и безопасности.
              - >-
                В основе наших решений лежит современная технология
                производства витаминов, которая включает лабораторные
                исследования, контроль сырья и оптимизацию формул. Мы
                используем новые технологии производства витаминов, а также
                элементы биотехнологического производства витаминов, что
                позволяет создавать эффективные и безопасные формулы для
                различных категорий потребителей.
          - title: Производство витаминов в Украине
            paragraphs:
              - >-
                Наше производство витаминов в Украине охватывает разработку
                рецептур, подбор ингредиентов, тестирование и серийный выпуск
                продукции. Благодаря этому бренды могут выводить на рынок
                витамины производства Украина, соответствующие международным
                стандартам и ожиданиям потребителей. Многие из таких продуктов
                становятся лучшими витаминами украинского производства в своих
                категориях.
              - >-
                Bio Light также помогает запускать СТМ (собственные торговые
                марки) — мы выполняем разработку СТМ, обеспечиваем контрактное
                производство СТМ, а также консультируем по вопросам вывода
                продукта на рынок и продвижения СТМ. Такой подход позволяет
                предпринимателям и компаниям быстро создать собственную линейку
                витаминов, нутрицевтиков и диетических добавок.
              - >-
                Наши производственные мощности позволяют реализовывать
                производство медикаментов, витаминов и препаратов биосинтеза,
                включая различные формы выпуска: капсулы, таблетки, порошковые
                смеси и жидкие формулы.
              - >-
                Сотрудничая с Bio Light, вы получаете надежного партнера для
                контрактного производства витаминов, который обеспечивает
                полный цикл — от идеи продукта до его успешного запуска на
                рынок.

